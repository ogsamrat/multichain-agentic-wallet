name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Naming purge gate
        run: npm run verify:naming
      - name: Lint
        run: npm run lint
      - name: Build (typecheck + emit)
        run: npm run build
      - name: Test
        run: npm test
