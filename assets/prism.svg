<svg xmlns="http://www.w3.org/2000/svg" width="820" height="220" viewBox="0 0 820 220" fill="none" role="img" aria-label="Prism — multichain agentic wallet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="820" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c0e16"/>
      <stop offset="1" stop-color="#0a0b10"/>
    </linearGradient>
    <linearGradient id="glass" x1="95" y1="55" x2="185" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0.10"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="816" height="216" rx="26" fill="url(#bg)" stroke="#242838"/>

  <!-- input beam -->
  <line x1="34" y1="116" x2="120" y2="116" stroke="#eef0fb" stroke-width="3" stroke-linecap="round"/>

  <!-- prism -->
  <path d="M150 52 L196 150 L104 150 Z" fill="url(#glass)" stroke="#cdd2ea" stroke-opacity="0.55" stroke-width="2" stroke-linejoin="round"/>

  <!-- spectrum out -->
  <g stroke-width="3.2" stroke-linecap="round" opacity="0.95">
    <line x1="175" y1="120" x2="250" y2="92"  stroke="#7c5cff"/>
    <line x1="176" y1="122" x2="252" y2="108" stroke="#19c3a6"/>
    <line x1="176" y1="124" x2="252" y2="124" stroke="#f0b429"/>
    <line x1="175" y1="126" x2="250" y2="140" stroke="#ff5c7c"/>
  </g>

  <!-- wordmark -->
  <text x="290" y="120" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, Helvetica, Arial" font-size="66" font-weight="800" letter-spacing="6" fill="#f3f4fb">PRISM</text>
  <text x="293" y="156" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, Helvetica, Arial" font-size="16" font-weight="600" letter-spacing="5" fill="#9aa0b6">MULTICHAIN&#160;&#160;AGENTIC&#160;&#160;WALLET</text>
</svg>
